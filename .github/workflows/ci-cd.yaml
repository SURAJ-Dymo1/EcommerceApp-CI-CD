name: Three Tier CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- FRONTEND ----------------
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_USERNAME }}/ecom-frontend:${{ env.IMAGE_TAG }}

      # ---------------- BACKEND ----------------
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_USERNAME }}/ecom-backend1:${{ env.IMAGE_TAG }}

      # ---------------- UPDATE K8S MANIFESTS ----------------
      - name: Update Kubernetes Manifests
        run: |
          sed -i "s|image: .*ecom-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ecom-frontend:${IMAGE_TAG}|g" k8s/frontend/deployment.yaml
          sed -i "s|image: .*ecom-backend1:.*|image: ${{ secrets.DOCKER_USERNAME }}/ecom-backend1:${IMAGE_TAG}|g" k8s/backend/deployment.yaml

      - name: Commit Updated Manifests
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/
          git commit -m "Update image tags to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
          git push