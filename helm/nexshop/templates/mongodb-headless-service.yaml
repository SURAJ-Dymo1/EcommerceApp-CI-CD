apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  labels:
    {{- include "nexshop.labels" . | nindent 4 }}
    app: mongodb
spec:
  ports:
    - port: {{ .Values.mongodb.service.port }}
      targetPort: {{ .Values.mongodb.service.targetPort }}
      name: mongodb
  clusterIP: None
  selector:
    app: mongodb
