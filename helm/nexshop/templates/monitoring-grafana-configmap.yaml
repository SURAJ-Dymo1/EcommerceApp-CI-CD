{{- if .Values.monitoring.grafana.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    {{- include "nexshop.labels" . | nindent 4 }}
data:
  prometheus.yaml: |-
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:{{ .Values.monitoring.prometheus.service.port }}
        isDefault: true
        editable: true
{{- end }}
