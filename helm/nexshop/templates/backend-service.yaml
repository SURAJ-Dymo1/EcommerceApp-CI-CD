apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "nexshop.labels" . | nindent 4 }}
    app: backend
spec:
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
      name: http
  selector:
    app: backend
  type: {{ .Values.backend.service.type }}
